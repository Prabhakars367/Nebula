version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: nebula
      POSTGRES_PASSWORD: nebula_password
      POSTGRES_DB: nebula_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nebula -d nebula_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
